services:
  backend:
    build:
      context: ./backend
    container_name: questboard-backend
    environment:
      QUESTBOARD_DATABASE_URL: sqlite:////data/questboard.db
    volumes:
      - ./data:/data
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: questboard-frontend
    environment:
      PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
